name: Build Windows Executable

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-helper.txt

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name BattleshipHelper battleshiphelper.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: BattleshipHelper-windows
          path: dist/BattleshipHelper.exe
          if-no-files-found: error

      - name: Upload executable to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BattleshipHelper.exe